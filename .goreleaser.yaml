version: 2

project_name: datatug

before:
  hooks:
    - go mod tidy

builds:
  - id: datatug-unix
    main: .
    binary: datatug
    env: [ CGO_ENABLED=0 ]
    goos: [ linux, darwin ]
    goarch: [ amd64, arm64 ]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

  - id: datatug-windows
    main: .
    binary: datatug
    env: [ CGO_ENABLED=0 ]
    goos: [ windows ]
    goarch: [ amd64 ]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: tarball
    formats: [ tar.gz ]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    ids: [ datatug-unix ]
    files:
      - README.md
      - LICENSE*

  - id: zip
    formats: [ zip ]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    ids: [ datatug-windows ]

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

release:
  github:
    owner: datatug
    name: datatug-cli

# Homebrew cask (ecosystem standard; `brews:` is deprecated — see strongo/cicd
# README "Packaging conventions"). GoReleaser auto-installs the `datatug` binary
# from the archive, so the old `bin.install` and `--version` smoke test are no
# longer needed (casks have no install/test hook).
homebrew_casks:
  - name: datatug
    ids:
      - tarball
    description: "DataTug – Context-aware data viewer & collaborative query manager for effortless exploration of related data — CLI + Web UI"
    homepage: https://github.com/datatug/datatug-cli
    license: MIT

    repository:
      owner: datatug
      name: homebrew-tap
      # Forwarded by the shared strongo/cicd release.yml (mapped from the repo's
      # HOMEBREW_TAP_GITHUB_TOKEN secret).
      token: "{{ .Env.GORELEASER_GITHUB_TOKEN }}"