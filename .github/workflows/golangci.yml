name: Go CI

on:
  push:
    # Only run on pushes to the default branch (e.g. merges). PRs are covered
    # by the pull_request trigger below; scoping push to main avoids running
    # the same checks twice (push + pull_request) on every PR-branch push.
    branches:
      - main
    paths:
      - 'go.*'
      - '**/*.go'
      - 'src/**'
      - '.github/workflows/golangci.yml'
  #    tags:
  #      - 'v[0-9]+\.[0-9]+\.[0-9]+' # Push events to matching v*, i.e. v20.15.10
  pull_request:
    branches:
      - '**'
    paths:
      - 'go.*'
      - '**/*.go'
      - 'src/**'
      - '.github/workflows/*.yml'

jobs:

  strongo_workflow:
    permissions:
      contents: write
    uses: strongo/cicd/.github/workflows/workflow.yml@main
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    with:
      # Uses the C-based github.com/mattn/go-sqlite3 driver, which requires cgo.
      cgo_enabled: true
      disable-version-bumping: false
      code_coverage: true
      min_test_coverage_percent: 60.9
