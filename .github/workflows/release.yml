name: Release

# Continuous delivery: every merge to `main` runs the shared strongo/cicd
# release workflow, which bumps the version from conventional commits and
# releases it in one run (GoReleaser against this repo's .goreleaser.yaml).
# Pushing an explicit `vX.Y.Z` tag also works and releases that exact version.
# A docs/chore-only merge cuts no tag and publishes nothing.
#
# datatug-cli is pre-1.0: allow_major_version_bump stays false, so a stray
# `feat!:` is capped to a minor bump instead of jumping to v1.0.0. Cut v1.0.0
# deliberately by pushing that tag.
#
# The release binaries are CGO_ENABLED=0 (see .goreleaser.yaml builds), so they
# cross-compile cleanly on the shared ubuntu runner even though CI tests use cgo
# for the sqlite driver.

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

# One release at a time; a second push queues instead of racing the first.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    uses: strongo/cicd/.github/workflows/release.yml@v1
    permissions:
      contents: write
    with:
      # Pre-1.0: cap an accidental major (feat!:) to a minor bump.
      allow_major_version_bump: false
    secrets:
      # Cross-repo PAT for the Homebrew tap (datatug/homebrew-tap), forwarded to
      # GoReleaser as $GORELEASER_GITHUB_TOKEN and referenced by the cask's
      # repository.token. Reuses the repo's existing HOMEBREW_TAP_GITHUB_TOKEN.
      GORELEASER_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
