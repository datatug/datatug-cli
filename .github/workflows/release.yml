name: Release

on:
  # Manual-only trigger: kick off from the Actions tab or via
  #   gh workflow run release.yml --ref <tag-or-branch>
  # goreleaser uses the checked-out git state (commit + nearest tag) to
  # determine the version. Push-on-tag is intentionally disabled so the
  # auto-bumping in Go CI doesn't trigger a binary release on every push
  # to main; we cut releases on a human cadence instead.
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Debug Homebrew token
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "${HOMEBREW_TAP_GITHUB_TOKEN:-}" ]; then
            echo "❌ HOMEBREW_TAP_GITHUB_TOKEN is NOT set"
            exit 1
          else
            echo "✅ HOMEBREW_TAP_GITHUB_TOKEN is set"
          fi

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: v2
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
