# SpecScore Repo Config Schema: https://specscore.md/repo-config

project:
  title: DataTug CLI

# Reviewer gates (event-keyed per the reviewer-gates contract / loader).
# specstudio:specify guards gates.feature.approved.
gates:
  feature.approved:
    reviewers:
      - type: ai
        name: spec-reviewer
        prompt: .specscore/reviewers/specify-reviewer.md
      - type: human
  # specstudio:implement guards gates.implementation.pre_commit (per-commit human checkpoint).
  implementation.pre_commit:
    reviewers:
      - type: human
  # specstudio:ship guards gates.ship.pre_dispatch — the go/no-go before the deploy
  # delegate is dispatched. Ship carries no built-in reviewer; if this is absent
  # the reviewer-gates loader refuses and ship halts.
  ship.pre_dispatch:
    reviewers:
      - type: human

# Deploy delegate dispatched by specstudio:ship on the delegate's explicit success.
# Only delegate.skill and delegate.args are recognized (the ship: schema MUST NOT grow).
ship:
  delegate:
    skill: datatug-release
    args: minor   # bump level (major|minor|patch) or an explicit vX.Y.Z
