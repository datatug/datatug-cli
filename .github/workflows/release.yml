name: Release

on:
  # Manual-only trigger. Dispatch from the Actions tab or via:
  #   gh workflow run release.yml --field tag=v0.1.0
  # The workflow YAML itself comes from main (so improvements land
  # without needing to re-cut a tag), but the checkout step picks up
  # the SPECIFIC tag passed via `inputs.tag` — that's what goreleaser
  # releases. Decouples "workflow source" from "release target".
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to release (e.g. v0.1.0). Must exist on origin.'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          # Check out the SPECIFIC tag the dispatcher asked to release,
          # not the ref the workflow was triggered from. goreleaser
          # checks `HEAD must equal <tag>'s commit` and would otherwise
          # fail with "git tag <X> was not made against commit <Y>".
          ref: ${{ inputs.tag }}
          # goreleaser inspects the git state (tags + commit history) to
          # determine the version and changelog. The default shallow
          # clone has no tags, so without this it errors out with
          #   "git doesn't contain any tags"
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Debug Homebrew token
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "${HOMEBREW_TAP_GITHUB_TOKEN:-}" ]; then
            echo "❌ HOMEBREW_TAP_GITHUB_TOKEN is NOT set"
            exit 1
          else
            echo "✅ HOMEBREW_TAP_GITHUB_TOKEN is set"
          fi

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: v2
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
